<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management - AKLTECH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="menu.css">
</head>
<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-area">
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <div style="display: flex; align-items: center;">
                    <img src="logo.jpg" alt="AKLTECH" class="logo-img">
                    <h1>AKLTECH</h1>
                </div>
                <div class="sidebar-toggle" id="sidebar-arrow">
                    <i class="fa-solid fa-chevron-left"></i>
                </div>
                <div class="close-sidebar" id="close-sidebar">
                    <i class="fa-solid fa-xmark"></i>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item" data-target="../overveiw/overveiw.html"><i class="fa-solid fa-house"></i> <span>Main Overview</span></li>
                    <li class="nav-item" data-target="../orders/orders.html"><i class="fa-solid fa-chart-line"></i> <span>Orders & Performance</span></li>
                    <li class="nav-item" data-target="../reservations/reservations.html"><i class="fa-solid fa-calendar-check"></i> <span>Reservations</span></li>
                    <li class="nav-item" data-target="../reports/reports.html"><i class="fa-solid fa-file-invoice-dollar"></i> <span>Reports & Analytics</span></li>
                    <li class="nav-item" data-target="../ai-module/ai.html"><i class="fa-solid fa-brain"></i> <span>AI Insights</span></li>
                    <li class="nav-item active" data-target="#"><i class="fa-solid fa-utensils"></i> <span>MENU</span></li>
                    <li class="nav-item" data-target="../feedback/feedback.html"><i class="fa-solid fa-star"></i> <span>Feedbacks</span></li>
                </ul>
            </nav>
        </aside>

        <div class="main-content-wrapper">
            <header class="topbar">
                <div class="topbar-left">
                    <i class="fa-solid fa-bars mobile-toggle" id="mobile-toggle"></i>
                    <h2 id="page-title">Menu Management</h2>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-primary" onclick="openMenuModal()">
                        <i class="fa-solid fa-plus"></i> <span>Add New Item</span>
                    </button>
                    
                    <button id="theme-toggle" class="btn btn-outline" title="Toggle Light/Dark Mode">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    
                    <button id="btn-logout" class="btn btn-danger">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i> <span>Logout</span>
                    </button>
                </div>
            </header>

            <section class="content">
                <div class="menu-grid" id="menu-grid">
                    </div>
            </section>
        </div>
    </main>

    <div id="menuModal" class="modal">
        <div class="modal-content"> 
            <div class="modal-header">
                <h2 id="modal-title"><i class="fa-solid fa-burger"></i> Add Menu Item</h2>
                <span class="close" onclick="closeMenuModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="item-id">
                
                <div class="form-grid">
                    <input type="text" id="item-name" placeholder="Item Name *" class="input-field">
                    <input type="number" id="item-category" placeholder="Category ID *" class="input-field">
                    <input type="number" id="item-price" placeholder="Price *" step="0.01" class="input-field">
                    <input type="text" id="item-image" placeholder="Image URL" class="input-field">
                    <input type="text" id="item-type" placeholder="Item Type (e.g., Main)" class="input-field">
                    <input type="text" id="item-cuisine" placeholder="Cuisine (e.g., Italian)" class="input-field">
                    <input type="number" id="item-calories" placeholder="Calories" class="input-field">
                </div>
                
                <textarea id="item-desc" placeholder="Description" class="input-field" style="margin-top: 15px; resize: vertical; min-height: 80px;"></textarea>

                <h4 style="margin-top: 15px; color: var(--text-main); font-size: 14px;">Availability & Season</h4>
                <div class="form-grid" style="margin-top: 5px;">
                    <div>
                        <label style="font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px;">Available From</label>
                        <input type="time" id="item-time-from" class="input-field">
                    </div>
                    <div>
                        <label style="font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px;">Available To</label>
                        <input type="time" id="item-time-to" class="input-field">
                    </div>
                    <div>
                        <label style="font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px;">Season Start</label>
                        <input type="date" id="item-date-start" class="input-field">
                    </div>
                    <div>
                        <label style="font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px;">Season End</label>
                        <input type="date" id="item-date-end" class="input-field">
                    </div>
                </div>

                <div class="checkbox-grid" style="display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px;">
                    <label class="checkbox-group"><input type="checkbox" id="item-available" checked> Available</label>
                    <label class="checkbox-group"><input type="checkbox" id="item-spicy"> Spicy 🌶️</label>
                    <label class="checkbox-group"><input type="checkbox" id="item-vegan"> Vegan 🥬</label>
                    <label class="checkbox-group"><input type="checkbox" id="item-healthy"> Healthy 🥗</label>
                </div>

                <button class="btn btn-primary" onclick="saveMenuItem()" id="save-btn" style="margin-top: 25px; width: 100%; height: 45px;">Save Item</button>
            </div>
        </div>
    </div>

    <script src="menu.js"></script>
</body>
</html>
