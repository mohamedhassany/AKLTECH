<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations - AKLTECH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="reservations.css">
</head>

<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-area">
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="logo.jpg" alt="AKLTECH" class="logo-img" onerror="this.src='https://via.placeholder.com/40/2563eb/fff?text=A'">
                <h1>AKLTECH</h1>
                <div class="sidebar-toggle" id="sidebar-arrow">
                    <i class="fa-solid fa-chevron-left"></i>
                </div>
                <div class="close-sidebar" id="close-sidebar">
                    <i class="fa-solid fa-xmark"></i>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item" data-target="../overveiw/overveiw.html"><i class="fa-solid fa-house"></i> <span>Main Overview</span></li>
                    <li class="nav-item" data-target="../orders/orders.html"><i class="fa-solid fa-chart-line"></i> <span>Orders & Performance</span></li>
                    <li class="nav-item active" data-target="#"><i class="fa-solid fa-calendar-check"></i> <span>Reservations</span></li>
                    <li class="nav-item" data-target="../reports/reports.html"><i class="fa-solid fa-file-invoice-dollar"></i> <span>Reports & Analytics</span></li>
                    <li class="nav-item" data-target="../ai-module/ai.html"><i class="fa-solid fa-brain"></i> <span>AI Insights</span></li>
                    <li class="nav-item" data-target="../menu\menu.html"><i class="fa-solid fa-utensils"></i> <span>MENU</span></li>
                    <li class="nav-item" data-target="../feedback/feedback.html"><i class="fa-solid fa-star"></i> <span>Feedbacks</span></li>
                </ul>
            </nav>

            <footer class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar"><i class="fa-solid fa-user-tie"></i></div>
                    <div class="details">
                        <small>Logged in as</small>
                        <strong>Manager</strong>
                    </div>
                </div>
            </footer>
        </aside>

        <div class="main-content-wrapper" id="content-wrapper">
            <header class="topbar">
                <div class="topbar-left">
                    <div class="mobile-toggle" id="mobile-sidebar-toggle">
                        <i class="fa-solid fa-bars"></i>
                    </div>
                    <div>
                        <h2 id="page-title">Reservations</h2>
                        <p class="greeting" id="greeting-text">Manage tables and bookings</p>
                    </div>
                </div>
                <div class="topbar-right">
                    <button id="theme-toggle" class="btn btn-outline" title="Toggle Light/Dark Mode"><i class="fa-solid fa-moon"></i></button>
                    <button id="btn-logout" class="btn btn-danger"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
                </div>
            </header>

            <section class="content">
                <div class="card map-card">
                    <div class="card-header">
                        <h3><i class="fa-solid fa-border-all"></i> Tables Floor Plan</h3>
                    </div>
                    <div class="tables-map" id="tables-map">
                        </div>
                </div>

                <div class="card table-card mt-4">
                    <div class="card-header table-header">
                        <h3><i class="fa-solid fa-list-check"></i> Reservations List</h3>
                        
                        <div class="filter-group">
                            <div class="search-box">
                                <i class="fa-solid fa-magnifying-glass"></i>
                                <input type="text" id="res-search" placeholder="Search Name, Phone, Email, ID..." />
                            </div>
                            <input type="date" id="res-date" class="input-field select-filter" title="Specific Date">
                            <select id="res-range" class="input-field select-filter">
                                <option value="today">Today</option>
                                <option value="next_week">Next 7 Days</option>
                                <option value="next_month">Next 30 Days</option>
                                <option value="all">All Time</option>
                            </select>
                            <select id="res-history" class="input-field select-filter">
                                <option value="upcoming">Upcoming</option>
                                <option value="past">Past / History</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="table-container">
                        <table class="data-table" id="reservations-table">
                            <thead>
                                <tr>
                                    <th class="sortable" data-sort="id">Res ID <i class="fa-solid fa-sort"></i></th>
                                    <th class="sortable" data-sort="customer">Customer <i class="fa-solid fa-sort"></i></th>
                                    <th class="sortable" data-sort="table">Table <i class="fa-solid fa-sort"></i></th>
                                    <th class="sortable" data-sort="time">Time <i class="fa-solid fa-sort"></i></th>
                                    <th class="sortable" data-sort="guests">Guests <i class="fa-solid fa-sort"></i></th>
                                    <th class="sortable" data-sort="status">Status <i class="fa-solid fa-sort"></i></th>
                                    <th style="width: 50px; cursor: default;"></th>
                                </tr>
                            </thead>
                            </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="table-modal" class="modal">
        <div class="modal-content card table-modal-content">
            <div class="modal-header">
                <h2 id="modal-table-title"><i class="fa-solid fa-utensils"></i> Table Details</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <div id="table-reservations-list" class="res-list">
                    </div>
            </div>
        </div>
    </div>

    <script src="reservations.js"></script>
</body>
</html>
